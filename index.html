<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIDLL 2026 — Call for Papers</title>
  <meta name="description" content="Call for Papers oficial del XXVII Congreso Internacional de la SIDLL, Málaga 2026." />
  <style>
    :root {
      --bg:#f4f7fc;
      --bg-2:#eef3fb;
      --card:rgba(255,255,255,.84);
      --card-strong:#ffffff;
      --text:#16213c;
      --muted:#5b6881;
      --line:rgba(22,33,60,.11);
      --blue:#1c5fd3;
      --navy:#153582;
      --red:#cf2948;
      --radius:28px;
      --shadow:0 18px 40px rgba(21,53,130,.08);
      --max:1320px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(28,95,211,.12), transparent 28%),
        radial-gradient(circle at top right, rgba(207,41,72,.10), transparent 32%),
        linear-gradient(180deg,#f8fbff 0%, #f1f5fb 100%);
    }
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}
    .container{width:min(calc(100% - 40px), var(--max)); margin:0 auto}

    .topbar{
      position:sticky; top:0; z-index:1000;
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,.85);
      box-shadow:0 8px 26px rgba(21,53,130,.05);
    }
    .topbar::after{
      content:""; display:block; height:1px;
      background:linear-gradient(90deg, rgba(28,95,211,.18), rgba(207,41,72,.14));
    }
    .topbar-inner{display:grid; grid-template-columns:110px minmax(0,1fr) auto; gap:20px; align-items:center; min-height:92px; padding:12px 0}
    .brand{display:flex; align-items:center; justify-content:center}
    .brand img{width:92px; height:92px; object-fit:cover; border-radius:22px; box-shadow:0 12px 30px rgba(21,53,130,.12)}
    .nav-zone{display:grid; grid-template-columns:minmax(0,1fr) auto; gap:18px; align-items:center}
    .desktop-nav{display:flex; flex-wrap:wrap; justify-content:flex-end; gap:8px 10px}
    .nav-link{padding:9px 14px; border-radius:999px; font-size:.9rem; font-weight:800; color:var(--muted); transition:.2s ease}
    .nav-link:hover,.nav-link.active{background:rgba(28,95,211,.10); color:var(--blue)}
    .lang-switcher{display:grid; grid-template-columns:repeat(2,56px); gap:8px}
    .lang-btn{border:1px solid var(--line); background:rgba(255,255,255,.9); color:var(--muted); border-radius:999px; min-width:56px; padding:10px 0; font-weight:800; font-size:.88rem; cursor:pointer; transition:.2s ease}
    .lang-btn:hover{transform:translateY(-1px); border-color:rgba(28,95,211,.28); color:var(--blue)}
    .lang-btn.active{border-color:transparent; color:#fff; background:linear-gradient(135deg,var(--blue),var(--navy)); box-shadow:0 10px 22px rgba(28,95,211,.22)}
    .mobile-toggle{display:none; border:0; background:transparent; font-size:1.7rem; color:var(--navy); cursor:pointer}
    .mobile-panel{display:none; padding:0 0 18px}
    .mobile-nav,.mobile-langs{display:grid; gap:8px}
    .mobile-nav a,.mobile-langs button{border:1px solid var(--line); background:rgba(255,255,255,.9); border-radius:16px; padding:12px 14px; font-weight:800; color:var(--muted); text-align:left}

    .hero{padding:40px 0 22px}
    .hero-card{
      border-radius:34px; overflow:hidden; box-shadow:var(--shadow); position:relative;
      background:
        radial-gradient(circle at top left, rgba(28,95,211,.08), transparent 40%),
        radial-gradient(circle at right center, rgba(207,41,72,.08), transparent 34%),
        rgba(255,255,255,.82);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.8);
      padding:40px 54px 56px;
    }
    .hero-top{display:flex; justify-content:center; align-items:center; margin:0 0 26px} .hero-grid{display:grid; grid-template-columns:minmax(0,1.2fr) minmax(320px, .8fr); gap:40px; align-items:center}
    .eyebrow{display:flex; align-items:center; justify-content:center; width:fit-content; max-width:100%; margin:0; text-align:center; padding:16px 42px; border-radius:999px; background:rgba(28,95,211,.08); color:var(--blue); font-weight:900; letter-spacing:.02em; text-transform:uppercase; font-size:1.36rem}
    .hero-call{font-size:4rem; line-height:.92; font-weight:1000; color:var(--red); margin:0 0 16px}
    .hero-title{font-size:3.85rem; line-height:1.02; letter-spacing:-.04em; font-weight:950; color:var(--navy); margin:0 0 20px; max-width:12ch}
    .hero-meta{display:grid; gap:8px; margin:0 0 26px; color:var(--muted); font-size:1.12rem; font-weight:600}
    .hero-actions{display:flex; flex-wrap:wrap; gap:12px}
    .btn{display:inline-flex; align-items:center; justify-content:center; padding:14px 22px; border-radius:999px; font-weight:900; font-size:1rem; transition:.2s ease}
    .btn-primary{background:linear-gradient(135deg,var(--blue),var(--navy)); color:#fff; box-shadow:0 14px 28px rgba(28,95,211,.2)}
    .btn-secondary{background:rgba(28,95,211,.08); color:var(--navy); border:1px solid rgba(28,95,211,.12)}
    .btn:hover{transform:translateY(-1px)}
    .hero-figure{background:rgba(255,255,255,.82); border:1px solid rgba(255,255,255,.88); border-radius:28px; box-shadow:0 18px 32px rgba(21,53,130,.08); padding:24px}
    .hero-figure img{width:100%; height:auto; object-fit:contain; border-radius:22px}

    .section{padding:18px 0 10px}
    .section-header{display:flex; justify-content:space-between; align-items:end; gap:20px; margin-bottom:18px}
    .section-header > div{display:grid; gap:14px; width:100%}
    h2{font-size:2.95rem; line-height:1; letter-spacing:-.04em; margin:0; color:var(--navy)}
    h3{font-size:1.1rem; line-height:1.18; margin:0 0 18px; color:var(--navy)}
    p{margin:0 0 16px; color:var(--muted); font-size:1.1rem; line-height:1.65}
    .section-desc{font-size:1.1rem; color:var(--muted); max-width:none; margin:0; background:var(--card); border:1px solid rgba(255,255,255,.78); backdrop-filter:blur(10px); box-shadow:var(--shadow); border-radius:var(--radius); padding:24px 28px}
    .card{background:var(--card); border:1px solid rgba(255,255,255,.78); backdrop-filter:blur(10px); box-shadow:var(--shadow); border-radius:var(--radius); padding:30px 32px; height:100%}
    .grid-2{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:22px}
    .grid-3{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:22px}
    .blocks-grid{display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:22px; align-items:start}
    .topic-card{min-height:138px; height:auto; display:flex; flex-direction:column; justify-content:flex-start; padding:20px 22px}
    .topic-index{width:58px; height:58px; border-radius:20px; display:grid; place-items:center; font-weight:900; font-size:1.08rem; color:var(--navy); background:linear-gradient(135deg, rgba(28,95,211,.08), rgba(207,41,72,.08)); margin-bottom:18px}
    .topic-card h3{font-size:.95rem; line-height:1.18; margin:0}
    .blocks-outro-card{display:flex; align-items:center; justify-content:flex-start; min-height:138px; height:auto; grid-column:span 2}
    .blocks-outro-card p{font-size:1.08rem; margin:0}
    .tag-list{display:flex; flex-wrap:wrap; gap:12px}
    .tag{display:inline-flex; padding:12px 16px; border-radius:16px; background:rgba(28,95,211,.06); color:var(--navy); font-weight:800; border:1px solid rgba(28,95,211,.08)}
    .bullet-list{margin:0; padding-left:26px; color:var(--muted); display:grid; gap:12px; font-size:1.08rem; line-height:1.65}
    .callout{padding:16px 18px; border-radius:18px; background:rgba(28,95,211,.06); border:1px solid rgba(28,95,211,.10); color:var(--muted)}
    .table-wrap{overflow:auto}
    table{width:100%; border-collapse:collapse; color:var(--muted)}
    th,td{padding:14px 14px; border-bottom:1px solid rgba(22,33,60,.08); text-align:left; font-size:1.04rem; vertical-align:top}
    th{color:var(--navy); font-weight:900}
    .timeline{display:grid; gap:16px}
    .time-item{display:grid; grid-template-columns:18px minmax(0,1fr); gap:14px; align-items:start}
    .time-dot{width:12px; height:12px; border-radius:999px; background:linear-gradient(135deg,var(--red),var(--blue)); margin-top:6px}
    .time-date{color:var(--muted); line-height:1.55}
    .org-logos{display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:22px}
    .org-box{background:var(--card); border:1px solid rgba(255,255,255,.8); box-shadow:var(--shadow); border-radius:28px; padding:28px; display:flex; align-items:center; justify-content:center; min-height:170px}
    .org-box img{max-width:100%; max-height:104px; width:auto; height:auto; object-fit:contain}
    #reqList{margin-top:44px}

    footer{padding:18px 0 48px}
    .footer-card{display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:16px}
    .footer-brand{display:flex; align-items:center; gap:14px; font-weight:900; color:var(--navy)}
    .footer-brand img{width:56px; height:56px; border-radius:16px}
    .to-top{position:fixed; right:22px; bottom:22px; border:0; width:52px; height:52px; border-radius:999px; background:linear-gradient(135deg,var(--blue),var(--navy)); color:#fff; font-size:1.2rem; box-shadow:0 16px 32px rgba(28,95,211,.25); cursor:pointer; opacity:0; visibility:hidden; transform:translateY(10px); transition:.22s ease; z-index:1000}
    .to-top.visible{opacity:1; visibility:visible; transform:translateY(0)}

    @media (max-width: 1200px){
      .hero-title{font-size:3.15rem}
      .hero-call{font-size:3.35rem}
      h2{font-size:2.65rem}
    }
    @media (max-width: 980px){
      .topbar-inner{grid-template-columns:92px 1fr auto}
      .desktop-nav,.lang-switcher{display:none}
      .mobile-toggle{display:block}
      .mobile-panel.open{display:grid; gap:12px}
      .hero-grid,.grid-2,.grid-3,.blocks-grid,.org-logos{grid-template-columns:1fr}
      .blocks-outro-card{grid-column:auto}
      .hero-card{padding:38px 28px}
      .hero-call{font-size:2.8rem}
      .hero-title{font-size:2.55rem; max-width:none}
      h2{font-size:2.15rem}
    }
    @media (max-width: 640px){
      .container{width:min(calc(100% - 24px), var(--max))}
      .topbar-inner{gap:12px; min-height:80px}
      .brand img{width:72px; height:72px; border-radius:18px}
      .hero{padding-top:24px}
      .eyebrow{font-size:.92rem; padding:10px 14px}
      .hero-call{font-size:2.2rem}
      .hero-title{font-size:2.05rem}
      .card{padding:24px 22px}
      .topic-card,.blocks-outro-card{min-height:unset}
      .topic-index{width:56px; height:56px; border-radius:18px}
    }
  </style>
</head>

    const I18N = {"es": {"langName": "Español", "pageTitle": "SIDLL 2026 — Call for Papers", "metaDesc": "Call for Papers oficial del XXVII Congreso Internacional de la SIDLL, Málaga 2026.", "brand": "AMPLIADO EL PLAZO DE RECEPCIÓN DE PROPUESTAS HASTA EL 15 DE JUNIO de 2026", "call": "CALL FOR PAPERS", "title": "La enseñanza de la Lengua y la Literatura en la era de la Inteligencia Artificial, la Interculturalidad y la Sostenibilidad Social", "venue": "Facultad de Ciencias de la Educación (Universidad de Málaga)", "dates": "Del 25 al 27 de noviembre de 2026", "nav": ["Presentación", "Bloques temáticos", "Líneas temáticas orientativas", "Participación", "Inscripción y cuotas", "Publicaciones", "Fechas y plazos", "Organizan", "Contacto"], "ctaForm": "Formulario", "ctaDates": "Fechas y plazos", "presentationTitle": "Presentación", "presentationP1": "La Sociedad Internacional de Didáctica de la Lengua y la Literatura (SIDLL) invita a la comunidad científica, académica y profesional a participar en el XXVII Congreso Internacional, que se celebrará los días 25, 26 y 27 de noviembre de 2026 en la Facultad de Ciencias de la Educación de la Universidad de Málaga (España).", "presentationP2": "El congreso se convoca en un momento especialmente significativo para repensar la enseñanza lingüístico-literaria en un contexto marcado por la transformación digital, la diversidad cultural y los retos de la sostenibilidad social. La expansión de la inteligencia artificial generativa abre nuevas posibilidades —y también interrogantes— en los procesos de lectura, escritura, creación, docencia, investigación y un largo etcétera. Por otra parte, la interculturalidad y la pluralidad lingüística reclaman enfoques inclusivos y sensibles a la diversidad; y la sostenibilidad social invita a vincular la educación literaria con la equidad, la justicia y el compromiso ciudadano.", "presentationP3": "Esta edición del congreso se articula en torno a tres ejes transversales e interrelacionados: inte kTitle": "Libro de Actas do Congreso", "bookText": "Os resumos serán publicados no Libro de Actas do Congreso, que contará co seu correspondente ISBN.", "fullTitle": "Traballos completos", "fullText": "Os traballos completos poderán publicarse nalgunha das seguintes modalidades:", "fullModes": ["Monografía nunha editorial de prestixio en acceso aberto.", "Monografía nunha revista indexada en SJR."], "reviewText": "A aceptación dos traballos estará suxeita a un proceso de revisión por pares en modalidade dobre cego, publicándose unicamente aqueles que superen satisfactoriamente a avaliación.", "otherTitle": "Outros resultados curriculares", "attendanceTitle": "Certificado de asistencia", "attendanceText": "Expedirase a todas as persoas participantes debidamente inscritas que asistan ao evento, como acreditación da súa presenza e participación nas actividades do congreso.", "participationTitle": "Certificación de participación", "participationText": "As persoas relatoras cuxas comunicacións sexan aceptadas e efectivamente presentadas durante o congreso recibirán o correspondente certificado oficial acreditativo da súa intervención no evento académico.", "datesTitle": "Datas e prazos", "dateItems": ["24 de marzo de 2026. Apertura da recepción de propostas.", "31 de maio de 2026. Data límite para o envío de propostas.", "21 de xullo de 2026. Notificación de aceptacións.", "15 de setembro de 2026. Fin do prazo do pagamento da cota reducida.", "30 de setembro de 2026. Programa provisional.", "30 de outubro de 2026. Fin do prazo de inscrición no congreso."], "orgTitle": "Organizan", "contactTitle": "Contacto", "footerMail": "sidll2026@uma.es"}, "eu": {"langName": "Euskara", "pageTitle": "SIDLL 2026 — Call for Papers", "metaDesc": "SIDLLren XXVII. Nazioarteko Kongresuaren Call for Papers ofiziala, Malaga 2026.", "brand": "SIDLLren XXVII. Nazioarteko Kongresua", "call": "CALL FOR PAPERS", "title": "Hizkuntzaren eta Literaturaren irakaskuntza Adimen Artifizialaren, Kulturartekotasunaren eta Gizarte Jasangarritasunaren aroan", "venue": "Hezkuntza Zientzien Fakultatea (Malagako Unibertsitatea)", "dates": "2026ko azaroaren 25etik 27ra", "nav": ["Aurkezpena", "Bloke tematikoak", "Gai-ildo orientagarriak", "Parte-hartzea", "Izen-ematea eta tasak", "Argitalpenak", "Datak eta epeak", "Antolatzaileak", "Harremana"], "ctaForm": "Formularioa", "ctaDates": "Datak eta epeak", "presentationTitle": "Aurkezpena", "presentationP1": "Hizkuntzaren eta Literaturaren Didaktikaren Nazioarteko Elkarteak (SIDLL) komunitate zientifikoa, akademikoa eta profesionala gonbidatzen du XXVII. Nazioarteko Kongresuan parte hartzera. Kongresua 2026ko azaroaren 25ean, 26an eta 27an egingo da Malagako Unibertsitateko Hezkuntza Zientzien Fakultatean (Espainia).", "presentationP2": "Kongresua une bereziki esanguratsuan deitzen da, hizkuntza- eta literatura-irakaskuntza berriz pentsatzeko, eraldaketa digitalak, kultura-aniztasunak eta gizarte-jasangarritasunaren erronkek markatutako testuinguruan. Adimen artifizial sortzailearen hedapenak aukera berriak —eta baita galderak ere— irekitzen ditu irakurketa, idazketa, sorkuntza, irakaskuntza, ikerketa eta beste hainbat prozesutan. Bestalde, kulturartekotasunak eta hizkuntza-aniztasunak ikuspegi inklusibo eta aniztasunarekiko sentikorrak eskatzen dituzte; eta gizarte-jasangarritasunak literatura-hezkuntza ekitatearekin, justiziarekin eta herritarren konpromisoarekin lotzera gonbidatzen du.", "presentationP3": "Kongresuaren edizio hau elkarren artean lotutako hiru ardatz nagusiren inguruan antolatzen da: adimen artifiziala eta hizkuntza- eta literatura-hezkuntza; kulturartekotasuna eta eleaniztasuna; eta gizarte-jasangarritasuna, Hizkuntzaren eta Literaturaren Didaktikari aplikatuta. Hala ere, kongresuak ikuspegi irekia mantentzen du; horregatik, Hizkuntzaren eta Literaturaren Didaktikarekin zentzu zabalean lotutako ekarpenak baloratuko dira.", "blocksTitle": "Bloke tematikoak", "blocksIntro": "Programaren koherentzia akademikoa sustatzeko eta ikerketa-ildoen zein antzeko irakaskuntza-praktiken arteko elkarrizketa bultzatzeko, Kongresua bloke tematikoetan antolatzen da. Bloke horiek truke- eta eztabaida-gune gisa ulertzen dira, eta aurkeztutako proposamen guztiak bertan integra daitezke, beren ikuspegiaren eta edukiaren arabera:", "blocks": ["Adimen artifiziala eta teknologia emergenteak", "Kulturartekotasuna", "Garapen Jasangarrirako Helburuak", "Hezkuntza elebiduna", "Hizkuntzaren eta Literaturaren Didaktika atzerriko hizkuntzetan edo bigarren hizkuntzetan", "Literatura-hezkuntza", "Multimodalitatea"], "blocksOutro": "Ikertzaileei eta profesionalei dei egiten zaie Hizkuntzaren eta Literaturaren Didaktikari buruzko eztabaida akademikoa eta gogoeta ikuspegi anitz eta berritzaileetatik aberastuko duten ekarpenak aurkeztera.", "linesTitle": "Gai-ildo orientagarriak", "linesIntro": "Besteak beste, honako lan-ildo hauek jotzen dira bereziki interesgarritzat:", "lines": ["Ahozko eta idatzizko komunikazio-gaitasunak", "Espainiera atzerriko hizkuntza gisa Lehen eta Bigarren Hezkuntzan: ikasle migratzaileen integrazioa", "Edukien eta atzerriko hizkuntzen ikaskuntza integratua", "Ikerketa hizkuntza eta literatura geletan", "Adimen artifiziala eta teknologia emergenteak hizkuntzaren eta literaturaren irakaskuntzan", "Hizkuntzaren eta literaturaren didaktika", "Haur eta Gazte Literatura", "Hizkuntza eta literaturako irakasleen prestakuntza", "Itzulpenaren eta interpretazioaren didaktika hezkuntza-esparruan", "Multimodalitatea hizkuntzaren didaktikan", "Espainiako hezkuntza-sistemako hizkuntza-curriculumak: ondorio didaktiko eta metodologikoak", "Eleaniztasuna", "Hizkuntzaren eta Literaturaren Didaktikarako interesgarriak diren beste lan-ildo batzuk"], "partTitle": "Parte-hartzea", "generalTitle": "Informazio orokorra", "reqTitle": "Kongresuan parte hartzeko baldintzak:", "reqs": ["Gutxienez ponentzia baten sinatzaile gisa agertzea; gehienez bi ponentzia izan daitezke.", "Parte-hartzaile gisa ere agertzea."], "formatTitle": "Proposamenak aurkezteko formatua", "formatItems": ["Luzera: 400 eta 500 hitz artean.", "Laburpenaren egitura gomendatua: sarrera, helburuak, metodologia, emaitzak, eztabaida eta ondorioak.", "Egitura hori egokitu ahal izango da (atalak kenduz, fusionatuz edo berrantolatuz) ikerketaren izaerak hala justifikatzen duenean.", "Bost gako-hitz adierazi beharko dira.", "Bidalketa webgunean proposamenak jasotzeko gaitutako formularioaren bidez baino ez da egingo, dagokion txantiloia erabiliz.", "Proposamena onartu ondoren, jakinarazpena posta elektronikoz bidaliko zaio lehenengo egileari."], "authTitle": "Egiletza", "authItems": ["Komunikazio bakoitzak gehienez lau egiletza izan ahalko ditu.", "Kongresuan parte hartzeko, egiletza guztiak behar bezala inskribatuta egon beharko dira eta dagokion kuota ordainduta izan beharko dute.", "Proposamena bidali ondoren, ez da onartuko egileen zerrendan alta, baja edo aldaketarik onarpen-ebazpena eman arte. Era berean, kongresua hasitakoan ezingo da egiletzan aldaketarik egin.", "Parte-hartzaile bakoitzak gehienez bi proposamen aurkeztu ahal izango ditu."], "langsTitle": "Komunikazioak eta tailerrak aurkezteko hizkuntzak", "langsText": "Gaztelania, katalana, galegoa, euskara, frantsesa, ingelesa eta portugesa.", "typesTitle": "Aurkezpen motak", "commTitle": "Komunikazioak", "commText": "Komunikazioek gehienez 15 minutuko iraupena izango dute. Saio bakoitzaren amaieran 5 minutuko txanda egongo da galderak, iruzkinak eta eztabaida akademikoa egiteko.", "sympTitle": "Sinposioak", "sympText": "Sinposio bakoitza gutxienez 3 ekarpenek eta gehienez 5ek osatuko dute, gai-ardatz komun baten inguruan eta pertsona arduradun baten koordinaziopean. Sinposioaren guztizko iraupena 90 minutukoa izango da. Proposamena koordinatzaileak soilik aurkeztu beharko du.", "workTitle": "Tailerrak", "workText": "Tailerrek 45 minutuko iraupena izango dute, eta aplikazio praktikora bideratuta egongo dira, bertaratutako pertsonen parte-hartze aktiboa sustatzeko.", "formLinkLabel": "Proposamenak bidaltzeko formulariorako esteka", "formLink": "https://congresosidll2026.es/index.php/participacion/informacion-general#propuestas", "feesTitle": "Izen-ematea eta tasak", "feesIntro": "Kongresurako izen-emateak honako hauek barne hartzen ditu: saio paraleloetara eta hitzaldi nagusietara sartzea, kongresurako materiala, ongietorriko kafeak eta parte-hartzearen eta bertaratzearen ziurtagiria.", "reduced": "Tarifa murriztua (2026/04/01etik 2026/09/15era)", "regular": "Tarifa arrunta (2026/09/16tik 2026/10/30era)", "category": "Kategoria", "price": "Prezioa", "feeRowsReduced": [["SIDLLko kideak", "150 €"], ["Beste batzuk", "250 €"], ["Ikasleak eta langabeak", "80 €"], ["Bertaratzaileak", "80 €"]], "feeRowsRegular": [["SIDLLko kideak", "180 €"], ["Beste batzuk", "300 €"], ["Ikasleak eta langabeak", "100 €"], ["Bertaratzaileak", "100 €"]], "pubsTitle": "Argitalpenak", "pubsIntro": "Kongresuak hainbat argitalpen-bide aurreikusten ditu aurkeztutako komunikazioetatik eratorritako lanetarako:", "bookTitle": "Kongresuko Akten Liburua", "bookText": "Laburpenak Kongresuko Akten Liburuan argitaratuko dira, dagokion ISBNarekin.", "fullTitle": "Lan osoak", "fullText": "Lan osoak honako modalitate hauetako batean argitaratu ahal izango dira:", "fullModes": ["Sarbide irekiko prestigiozko argitaletxe bateko monografia.", "SJRn indexatutako aldizkari bateko monografia."], "reviewText": "Lan onartuak ebaluazio bidezko parekoen berrikuspen-prozesu bikoitz itsu baten mende egongo dira, eta ebaluazioa behar bezala gainditzen dutenak bakarrik argitaratuko dira.", "otherTitle": "Beste emaitza curricular batzuk", "attendanceTitle": "Bertaratze-ziurtagiria", "attendanceText": "Ekitaldira joaten diren eta behar bezala inskribatuta dauden parte-hartzaile guztiei emango zaie, kongresuko jardueretan izan duten presentzia eta parte-hartzea egiaztatzeko.", "participationTitle": "Parte-hartzearen ziurtagiria", "participationText": "Onartuak izan eta kongresuan benetan aurkezten diren komunikazioen egileek ekitaldi akademikoan izan duten esku-hartzearen egiaztagiri ofiziala jasoko dute.", "datesTitle": "Datak eta epeak", "dateItems": ["2026ko martxoaren 24a. Proposamenak jasotzeko epearen hasiera.", "2026ko maiatzaren 31. Proposamenak bidaltzeko azken eguna.", "2026ko uztailaren 21a. Onarpenen jakinarazpena.", "2026ko irailaren 15a. Tarifa murriztua ordaintzeko epearen amaiera.", "2026ko irailaren 30a. Behin-behineko programa.", "2026ko urriaren 30a. Kongresuan izena emateko epearen amaiera."], "orgTitle": "Antolatzaileak", "contactTitle": "Harremana", "footerMail": "sidll2026@uma.es"}, "en": {"langName": "English", "pageTitle": "SIDLL 2026 — Call for Papers", "metaDesc": "Official Call for Papers for the 27th International SIDLL Conference, Málaga 2026.", "brand": "27th International SIDLL Conference", "call": "CALL FOR PAPERS", "title": "Language and Literature Education in the Era of Artificial Intelligence, Interculturality and Social Sustainability", "venue": "Faculty of Education Sciences (University of Málaga)", "dates": "25–27 November 2026", "nav": ["Presentation", "Thematic blocks", "Indicative thematic lines", "Participation", "Registration and fees", "Publications", "Dates and deadlines", "Organised by", "Contact"], "ctaForm": "Submission form", "ctaDates": "Dates and deadlines", "presentationTitle": "Presentation", "presentationP1": "The International Society for the Didactics of Language and Literature (SIDLL) invites the scientific, academic and professional community to participate in the 27th International Conference, which will be held on 25, 26 and 27 November 2026 at the Faculty of Education Sciences of the University of Málaga (Spain).", "presentationP2": "The conference is convened at a particularly significant moment for rethinking language and literature education in a context shaped by digital transformation, cultural diversity and the challenges of social sustainability. The expansion of generative artificial intelligence opens up new possibilities — and also new questions — in processes of reading, writing, creation, teaching, research and much more. At the same time, interculturality and linguistic plurality call for inclusive and diversity-sensitive approaches; and social sustainability invites us to connect literary education with equity, justice and civic commitment.", "presentationP3": "This edition of the conference is structured around three transversal and interrelated axes: artificial intelligence and language-and-literature education; interculturality and plurilingualism; and social sustainability applied to the Didactics of Language and Literature. Nevertheless, the conference maintains an open orientation, so contributions related to the Didactics of Language and Literature in a broad sense will also be welcome.", "blocksTitle": "Thematic blocks", "blocksIntro": "In order to foster the academic coherence of the programme and promote dialogue among related research lines and teaching practices, the Conference is organised into thematic blocks, conceived as spaces for exchange and debate, into which all submitted proposals may be integrated according to their focus and content:", "blocks": ["Artificial intelligence and emerging technologies", "Interculturality", "Sustainable Development Goals", "Bilingual education", "Didactics of Language and Literature in foreign languages or second languages", "Literary education", "Multimodality"], "blocksOutro": "Researchers and professionals are invited to submit contributions that enrich academic debate and reflection on the Didactics of Language and Literature from diverse and innovative perspectives.", "linesTitle": "Indicative thematic lines", "linesIntro": "Among others, the following lines of work are considered of particular interest:", "lines": ["Oral and written communication skills", "Teaching Spanish as a foreign language in Primary and Secondary Education: integration of migrant students", "Content and language integrated learning", "Research in language and literature classrooms", "Artificial intelligence and emerging technologies in language and literature teaching", "Didactics of language and literature", "Children’s and Young Adult Literature", "Teacher education in language and literature", "Didactics of translation and interpreting in the educational field", "Multimodality in language didactics", "Language curricula in the Spanish educational system: didactic and methodological implications", "Plurilingualism", "Other lines of work of interest for the Didactics of Language and Literature"], "partTitle": "Participation", "generalTitle": "General information", "reqTitle": "Requirements for participation in the conference:", "reqs": ["To appear as an author of at least one paper, with a maximum of two papers.", "To be registered as an attendee."], "formatTitle": "Format for proposal submission", "formatItems": ["Length: between 400 and 500 words.", "Recommended abstract structure: introduction, objectives, methodology, results, discussion and conclusions.", "This structure may be adapted (by omitting, merging or reorganising sections) when the nature of the study so justifies.", "Five keywords must be provided.", "Submission must be made exclusively through the form enabled on the website for proposal submission using the corresponding template.", "After acceptance of the proposal, notification will be sent by email to the first author."], "authTitle": "Authorship", "authItems": ["Each presentation may have a maximum of four authors.", "Participation in the conference requires that all authors be duly registered and have paid the corresponding fee.", "Once the proposal has been submitted, no additions, withdrawals or changes to the list of authors will be accepted until the acceptance decision has been issued. Likewise, no changes to authorship will be possible once the conference has started.", "A maximum of two proposals per participant is established."], "langsTitle": "Languages for presentations and workshops", "langsText": "Spanish, Catalan, Galician, Basque, French, English and Portuguese.", "typesTitle": "Types of presentation", "commTitle": "Papers", "commText": "Papers will have a maximum duration of 15 minutes. At the end of each session, a 5-minute slot will be provided for questions, comments and academic discussion.", "sympTitle": "Symposia", "sympText": "Each symposium will consist of a minimum of 3 contributions and a maximum of 5, articulated around a common thematic axis and coordinated by a person in charge. The total duration of the symposium will be 90 minutes. The proposal must be submitted exclusively by the coordinating person.", "workTitle": "Workshops", "workText": "Workshops will last 45 minutes and will be oriented towards practical application in order to encourage the active participation of attendees.", "formLinkLabel": "Link to the proposal submission form", "formLink": "https://congresosidll2026.es/index.php/participacion/informacion-general#propuestas", "feesTitle": "Registration and fees", "feesIntro": "Conference registration includes: access to parallel sessions and plenary lectures, conference materials, welcome coffees, and a certificate of participation and attendance.", "reduced": "Reduced fee (01/04/2026 to 15/09/2026)", "regular": "Regular fee (16/09/2026 to 30/10/2026)", "category": "Category", "price": "Price", "feeRowsReduced": [["SIDLL members", "150 €"], ["Others", "250 €"], ["Students and unemployed persons", "80 €"], ["Attendees", "80 €"]], "feeRowsRegular": [["SIDLL members", "180 €"], ["Others", "300 €"], ["Students and unemployed persons", "100 €"], ["Attendees", "100 €"]], "pubsTitle": "Publications", "pubsIntro": "The Conference envisages several publication pathways for the works derived from the papers presented:", "bookTitle": "Conference Proceedings Book", "bookText": "Abstracts will be published in the Conference Proceedings Book, which will have its corresponding ISBN.", "fullTitle": "Full papers", "fullText": "Full papers may be published in one of the following formats:", "fullModes": ["A monograph with a prestigious open-access publisher.", "A monograph in an SJR-indexed journal."], "reviewText": "Acceptance of papers will be subject to a double-blind peer-review process, and only those that satisfactorily pass the evaluation will be published.", "otherTitle": "Other curricular outcomes", "attendanceTitle": "Certificate of attendance", "attendanceText": "It will be issued to all duly registered participants who attend the event, as proof of their presence and participation in the conference activities.", "participationTitle": "Certificate of participation", "participationText": "Speakers whose papers are accepted and effectively presented during the conference will receive the corresponding official certificate accrediting their intervention in the academic event.", "datesTitle": "Dates and deadlines", "dateItems": ["24 March 2026. Opening of proposal submission.", "31 May 2026. Deadline for proposal submission.", "21 July 2026. Notification of acceptance.", "15 September 2026. End of the reduced-fee payment period.", "30 September 2026. Provisional programme.", "30 October 2026. Deadline for conference registration."], "orgTitle": "Organised by", "contactTitle": "Contact", "footerMail": "sidll2026@uma.es"}, "fr": {"langName": "Français", "pageTitle": "SIDLL 2026 — Call for Papers", "metaDesc": "Appel à communications officiel du XXVIIe Congrès international de la SIDLL, Málaga 2026.", "brand": "XXVIIe Congrès international de la SIDLL", "call": "CALL FOR PAPERS", "title": "L’enseignement de la Langue et de la Littérature à l’ère de l’Intelligence Artificielle, de l’Interculturalité et de la Durabilité Sociale", "venue": "Faculté des Sciences de l’Éducation (Université de Málaga)", "dates": "Du 25 au 27 novembre 2026", "nav": ["Présentation", "Blocs thématiques", "Axes thématiques indicatifs", "Participation", "Inscription et tarifs", "Publications", "Dates et échéances", "Organisent", "Contact"], "ctaForm": "Formulaire", "ctaDates": "Dates et échéances", "presentationTitle": "Présentation", "presentationP1": "La Société Internationale de Didactique de la Langue et de la Littérature (SIDLL) invite la communauté scientifique, académique et professionnelle à participer au XXVIIe Congrès international, qui se tiendra les 25, 26 et 27 novembre 2026 à la Faculté des Sciences de l’Éducation de l’Université de Málaga (Espagne).", "presentationP2": "Le congrès est convoqué à un moment particulièrement significatif pour repenser l’enseignement linguistique et littéraire dans un contexte marqué par la transformation numérique, la diversité culturelle et les défis de la durabilité sociale. L’expansion de l’intelligence artificielle générative ouvre de nouvelles possibilités — mais aussi de nouvelles interrogations — dans les processus de lecture, d’écriture, de création, d’enseignement, de recherche et bien plus encore. Par ailleurs, l’interculturalité et la pluralité linguistique appellent des approches inclusives et sensibles à la diversité ; et la durabilité sociale invite à relier l’éducation littéraire à l’équité, à la justice et à l’engagement citoyen.", "presentationP3": "Cette édition du congrès s’articule autour de trois axes transversaux et interdépendants : l’intelligence artificielle et l’éducation linguistique et littéraire ; l’interculturalité et le plurilinguisme ; et la durabilité sociale appliqués à la Didactique de la Langue et de la Littérature. Néanmoins, le congrès conserve une orientation ouverte ; des contributions relatives à la Didactique de la Langue et de la Littérature au sens large seront donc également prises en considération.", "blocksTitle": "Blocs thématiques", "blocksIntro": "Afin de favoriser la cohérence académique du programme et de promouvoir le dialogue entre lignes de recherche et pratiques pédagogiques affines, le Congrès est orga     const NAV_TARGETS = ['presentation','blocks','lines','participation','fees','publications','dates','organised','contact'];
    const mobileToggle = document.getElementById('mobileToggle');
    const mobilePanel = document.getElementById('mobilePanel');
    mobileToggle.addEventListener('click', () => mobilePanel.classList.toggle('open'));

    function fillList(id, items) {
      const el = document.getElementById(id); el.innerHTML='';
      items.forEach(item => {
        const li = document.createElement('li');
        li.textContent = item;
        el.appendChild(li);
      });
    }
    function fillTags(id, items) {
      const el = document.getElementById(id); el.innerHTML='';
      items.forEach(item => {
        const span = document.createElement('span');
        span.className='tag';
        span.textContent=item;
        el.appendChild(span);
      });
    }
    function fillBlocks(items, outro) {
      const el = document.getElementById('blocksGrid');
      el.innerHTML='';
      items.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className='card topic-card';
        card.innerHTML = `<div class="topic-index">${String(idx+1).padStart(2,'0')}</div><h3>${item}</h3>`;
        el.appendChild(card);
      });
      const outroCard = document.createElement('div');
      outroCard.className='card blocks-outro-card';
      outroCard.innerHTML = `<p class="section-desc">${outro}</p>`;
      el.appendChild(outroCard);
    }
    function fillTable(id, rows) {
      const el = document.getElementById(id); el.innerHTML='';
      rows.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td>`;
        el.appendChild(tr);
      });
    }
    function fillTimeline(items) {
      const el = document.getElementById('datesTimeline'); el.innerHTML='';
      items.forEach(item => {
        const wrap = document.createElement('div');
        wrap.className='time-item';
        wrap.innerHTML = `<div class="time-dot"></div><div class="time-date">${item}</div>`;
        el.appendChild(wrap);
      });
    }
    function renderNav(lang) {
      const desktop = document.getElementById('desktopNav');
      const mobile = document.getElementById('mobileNav');
      desktop.innerHTML=''; mobile.innerHTML='';
      I18N[lang].nav.forEach((label, idx) => {
        const a = document.createElement('a');
        a.href = `#${NAV_TARGETS[idx]}`;
        a.className = 'nav-link';
        a.textContent = label;
        const b = a.cloneNode(true);
        desktop.appendChild(a);
        mobile.appendChild(b);
      });
    }
    function renderLangs(active) {
      ['desktopLangs','mobileLangs'].forEach(id => {
        const box = document.getElementById(id); box.innerHTML='';
        LANGS.forEach(lang => {
          const btn = document.createElement('button');
          btn.className = 'lang-btn' + (lang.code===active ? ' active' : '');
          btn.textContent = lang.label;
          btn.addEventListener('click', () => setLang(lang.code));
          box.appendChild(btn);
        });
      });
    }
    function setText(id, value) { document.getElementById(id).textContent = value; }
    function setLang(lang) {
      const t = I18N[lang];
      document.documentElement.lang = lang;
      document.title = t.pageTitle;
      document.querySelector('meta[name="description"]').setAttribute('content', t.metaDesc);
      setText('heroBrand', t.brand);
      setText('heroCall', t.call);
      setText('heroTitle', t.title);
      setText('heroVenue', t.venue);
      setText('heroDates', t.dates);
      setText('btnForm', t.ctaForm);
      setText('btnDates', t.ctaDates);
      setText('presentationTitle', t.presentationTitle);
      setText('presentationP1', t.presentationP1);
      setText('presentationP2', t.presentationP2);
      setText('presentationP3', t.presentationP3);
      setText('blocksTitle', t.blocksTitle);
      setText('blocksIntro', t.blocksIntro);
      setText('linesTitle', t.linesTitle);
      setText('linesIntro', t.linesIntro);
      setText('partTitle', t.partTitle);
      setText('generalTitle', t.generalTitle);
      setText('reqTitle', t.reqTitle);
      setText('formatTitle', t.formatTitle);
      setText('authTitle', t.authTitle);
      setText('langsTitle', t.langsTitle);
      setText('langsText', t.langsText);
      setText('typesTitle', t.typesTitle);
      setText('commTitle', t.commTitle);
      setText('commText', t.commText);
      setText('sympTitle', t.sympTitle);
      setText('sympText', t.sympText);
      setText('workTitle', t.workTitle);
      setText('workText', t.workText);
      setText('formLinkLabel', t.formLinkLabel);
      const formAnchor = document.getElementById('formLinkAnchor');
      formAnchor.href = t.formLink; formAnchor.textContent = t.formLink;
      setText('feesTitle', t.feesTitle);
      setText('feesIntro', t.feesIntro);
      setText('reduced', t.reduced);
      setText('regular', t.regular);
      setText('catHead1', t.category);
      setText('priceHead1', t.price);
      setText('catHead2', t.category);
      setText('priceHead2', t.price);
      setText('pubsTitle', t.pubsTitle);
      setText('pubsIntro', t.pubsIntro);
      setText('bookTitle', t.bookTitle);
      setText('bookText', t.bookText);
      setText('fullTitle', t.fullTitle);
      setText('fullText', t.fullText);
      setText('otherTitle', t.otherTitle);
      setText('attendanceTitle', t.attendanceTitle);
      setText('attendanceText', t.attendanceText);
      setText('participationTitle', t.participationTitle);
      setText('participationText', t.participationText);
      setText('reviewText', t.reviewText);
      setText('datesTitle', t.datesTitle);
      setText('orgTitle', t.orgTitle);
      setText('contactTitle', t.contactTitle);
      setText('footerMail', t.footerMail);
      setText('footerTitle', t.brand);
      fillList('reqList', t.reqs);
      fillList('formatList', t.formatItems);
      fillList('authList', t.authItems);
      fillBlocks(t.blocks, t.blocksOutro);
      fillTags('linesList', t.lines);
      fillTable('feesReducedBody', t.feeRowsReduced);
      fillTable('feesRegularBody', t.feeRowsRegular);
      fillList('fullModes', t.fullModes);
      fillTimeline(t.dateItems);
      renderNav(lang);
      renderLangs(lang);
      localStorage.setItem('sidll-lang', lang);
      mobilePanel.classList.remove('open');
    }
    setLang(localStorage.getItem('sidll-lang') || 'es');

    const toTop = document.getElementById('toTop');
    window.addEventListener('scroll', () => {
      toTop.classList.toggle('visible', window.scrollY > 500);
      let current = '';
      NAV_TARGETS.forEach(id => {
        const sec = document.getElementById(id);
        if (sec && sec.getBoundingClientRect().top <= 140) current = sec.id;
      });
      document.querySelectorAll('.nav-link').forEach(link => link.classList.toggle('active', link.getAttribute('href') === `#${current}`));
    });
    toTop.addEventListener('click', () => window.scrollTo({top:0, behavior:'smooth'}));
  </script>
